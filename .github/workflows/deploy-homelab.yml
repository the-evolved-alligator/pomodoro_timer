name: Deploy to homelab

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Clean prior build artifacts
        run: |
          sg docker -c "docker run --rm -v \"${GITHUB_WORKSPACE}:/repo\" alpine:3.20 \
            sh -c 'rm -rf /repo/dist /repo/node_modules'"

      - name: Build
        run: |
          sg docker -c "docker run --rm --user $(id -u):$(id -g) -e HOME=/tmp \
            -v \"${GITHUB_WORKSPACE}:/repo\" \
            -w /repo \
            node:22-bookworm-slim \
            bash -lc 'npm ci && npm run build'"

      - name: Publish
        run: |
          DEST="/srv/homelab/data/websites/pomodoro"
          rm -rf "${DEST:?}"/*
          mkdir -p "$DEST"
          cp -a dist/. "$DEST/"
